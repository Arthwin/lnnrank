<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>lnnrank Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <nav class="tabs" id="tabs">
        <button class="tab is-active" data-tab="lfg">LFG</button>
        <button class="tab" data-tab="search">Search</button>
        <button class="tab" data-tab="live">Live Log</button>
        <button class="tab" data-tab="reader">Reader</button>
      </nav>

      <main class="tab-panels">
        <section class="panel" data-panel="search">
          <div class="panel-stack search-panel-stack">
            <div class="queue-layout search-layout">
              <section class="card queue-card">
                <div class="card-head">
                  <div class="queue-card-head-top">
                    <h2>Pending Queue</h2>
                    <button id="clearQueueButton" class="danger queue-clear-button" type="button">Clear Queue</button>
                  </div>
                </div>
                <div id="queueWorkerStatus" class="queue-worker-status"></div>
                <div id="queueList" class="list"></div>
              </section>

              <section class="card search-results-card">
                <div class="card-head">
                  <div class="queue-card-head-top">
                    <h2>Cached Results</h2>
                    <button id="clearResultsButton" class="danger compact-toolbar-button" type="button">Clear Cache</button>
                  </div>
                </div>

                <div class="panel-toolbar toolbar-row search-toolbar">
                  <input id="resultSearch" type="search" placeholder="Search cached characters..." />
                </div>

                <div class="table-wrap">
                  <table>
                    <thead>
                      <tr>
                        <th><button class="table-sort" type="button" data-sort-column="character">Character</button></th>
                        <th><button class="table-sort" type="button" data-sort-column="blendedPercent">lññ score</button></th>
                        <th><button class="table-sort" type="button" data-sort-column="averageParse">Avg Parse</button></th>
                        <th><button class="table-sort" type="button" data-sort-column="score">Score</button></th>
                        <th><button class="table-sort" type="button" data-sort-column="updatedAt">Updated</button></th>
                      </tr>
                    </thead>
                    <tbody id="resultsBody"></tbody>
                  </table>
                </div>

                <div id="resultsFooter" class="results-footer pager"></div>
              </section>
            </div>
          </div>
        </section>

        <section class="panel is-active" data-panel="lfg">
          <div class="queue-layout">
            <section class="card lfg-card">
              <div class="card-head">
                <div class="queue-card-head-top">
                  <h2>LFG</h2>
                  <button id="clearLfgButton" class="danger compact-toolbar-button" type="button">Clear LFG</button>
                </div>
              </div>
              <div id="applicantList" class="list"></div>
            </section>
          </div>
        </section>

        <section class="panel" data-panel="live">
          <div id="passiveView" class="panel-stack"></div>
        </section>

        <section class="panel" data-panel="reader">
          <div id="readerView" class="panel-stack"></div>
        </section>
      </main>
    </div>

    <div id="confirmModal" class="modal-shell" hidden aria-hidden="true">
      <div class="modal-backdrop" data-confirm-dismiss></div>
      <section
        class="modal-card"
        role="dialog"
        aria-modal="true"
        aria-labelledby="confirmModalTitle"
        aria-describedby="confirmModalMessage"
      >
        <h2 id="confirmModalTitle">Clear cached results?</h2>
        <p id="confirmModalMessage">This removes all cached character results from the local app.</p>
        <div class="modal-actions">
          <button id="confirmCancelButton" data-confirm-dismiss type="button">Cancel</button>
          <button id="confirmAcceptButton" class="danger" type="button">Clear Cache</button>
        </div>
      </section>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
