<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LÑÑRank Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <nav class="tabs" id="tabs">
        <button class="tab is-active" data-tab="lfg">LFG</button>
        <button class="tab" data-tab="queue">Queue</button>
        <button class="tab" data-tab="stats">Stats</button>
        <button class="tab" data-tab="results">Results</button>
      </nav>

      <main class="tab-panels">
        <section class="panel" data-panel="stats">
          <div class="panel-stack">
            <section class="card">
              <div class="card-head">
                <h2>Overview</h2>
              </div>
              <div class="summary-grid" id="statsGrid"></div>
            </section>

            <section class="card">
              <div class="card-head">
                <h2>Auto Sync</h2>
              </div>
              <div id="autoSyncStatus" class="list"></div>
            </section>
          </div>
        </section>

        <section class="panel" data-panel="results">
          <div class="panel-toolbar toolbar-row">
            <input id="resultSearch" type="search" placeholder="Search cached characters..." />
            <button id="clearResultsButton" class="danger compact-toolbar-button" type="button">Clear Cache</button>
            <div id="resultsPaginationTop" class="pager"></div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Character</th>
                  <th>Realm</th>
                  <th>Status</th>
                  <th>Source</th>
                  <th>Score</th>
                  <th>Updated</th>
                  <th>Dungeons</th>
                </tr>
              </thead>
              <tbody id="resultsBody"></tbody>
            </table>
          </div>
          <div id="resultsPaginationBottom" class="pager pager-end"></div>
        </section>

        <section class="panel" data-panel="queue">
          <div class="queue-layout">
            <section class="card queue-card">
              <div class="card-head">
                <div class="queue-card-head-top">
                  <h2>Pending Queue</h2>
                  <button id="clearQueueButton" class="danger queue-clear-button" type="button">Clear Queue</button>
                </div>
              </div>
              <div id="queueList" class="list"></div>
            </section>

            <section class="card">
              <div class="card-head">
                <h2>Recent Statuses</h2>
              </div>
              <div id="statusList" class="list"></div>
              <div id="statusPagination" class="pager pager-end"></div>
            </section>
          </div>
        </section>

        <section class="panel is-active" data-panel="lfg">
          <div class="queue-layout">
            <section class="card">
              <div id="applicantList" class="list"></div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
